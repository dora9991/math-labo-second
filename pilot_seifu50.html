<style>

  .meta{font-size:12px;color:var(--sub);margin-bottom:14px}
  .meta span{background:#eee;padding:2px 8px;border-radius:10px;margin-right:6px}
  .choices{display:grid;gap:8px}
  .choice{border:1px solid var(--line);border-radius:8px;padding:10px 14px;cursor:pointer;background:#fcfbf8}

  .choice.correct{border-color:var(--good);background:#eaf6ea}
  .choice.wrong{border-color:var(--bad);background:#faeaea}
  .choice .rationale{font-size:12px;color:var(--sub);margin-top:6px;display:none}
  .choice.revealed .rationale{display:block}

  .hint-toggle.open{background:var(--accent);color:#fff}
  .hint-panel{display:none;margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:14px;background:#fbfaf7}
  .hint-panel.open{display:block}
  .hint-panel-title{font-size:13px;color:var(--sub);margin-bottom:10px}
  .confusion-item{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:8px;

  .confusion-item:hover{border-color:var(--accent);background:#f5f9fd}
  .confusion-item.selected{border-color:var(--accent);background:#eaf1fa;font-weight:bold}
  .confusion-response{margin-top:10px;background:#fff8e6;border:1px solid #eddca0;border-radius:8px;padding:12px 14px;font-size:14px}
  .confusion-response .q{font-weight:bold;margin-bottom:6px}
  .confusion-response .more-link{display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline}
  .confusion-response .more-text{margin-top:8px;padding-top:8px;border-top:1px dashed #eddca0;display:none}
  .confusion-response .more-text.shown{display:block}

  .explanation{white-space:pre-wrap;font-size:14px}
  .rubric li{font-size:13px}
  .tm-box{border:1px dashed var(--line);border-radius:8px;padding:14px;background:#fbfaf7}
  .tm-teacher{background:#eef4fb;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:14px}
  .tm-choice{display:block;width:100%;text-align:left;padding:8px 12px;margin-bottom:6px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
  .tm-choice:hover{border-color:var(--accent)}
  .tm-end{color:var(--good);font-weight:bold;text-align:center;padding:10px}
  .reset-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline}
  .written-prompt{font-size:14px;margin-bottom:6px}
  .work-log{font-size:12px;color:var(--sub);border-top:1px dashed var(--line);margin-top:12px;padding-top:10px}
  .work-log .stu{margin-bottom:6px}
  .badge-correct{color:var(--good)}
  .badge-wrong{color:var(--bad)}
</style>
</head>

, "nodes": [{"id": "n1", "type": "explain", "text": "正の数と負の数の大小比べは、実はいちばん簡単なパターンなんだ。数直線で正の数は0の右、負の数は0の左。右にあるほど大きいから、正の数は負の数よりいつでも大きい。数字の大きさを比べる必要すらないんだよ。", "next": "n2"}, {"id": "n2", "type": "check", "question": "+2と−7では、どちらが大きい？", "choices": ["+2", "-7（7の方が大きい数字だから）"], "correct": 0, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "気温で考えてみよう。+2℃と−7℃、あたたかいのはどっち？ −7℃は氷点下でずっと寒いよね。数字の7が2より大きくても、−7は0より7も小さい数で、数直線では0のずっと左にいるんだ。符号を無視して数字だけで比べると逆になっちゃうよ。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "大小が分かったら、次は不等号の書き方。不等号は、開いている側（広い側）に大きい数、とがった側に小さい数がくるんだ。『大きい方をパクッと食べる口』のイメージだね。大小の判断が合っていても、向きを逆に書くともったいないから、最後にひと呼吸おいて確かめよう。", "next": "n4"}, {"id": "n4", "type": "check", "question": "『+9の方が−5より大きい』を不等号で正しく書くと？", "choices": ["+9 > -5", "+9 < -5"], "correct": 0, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "口が開いている方が大きい数を向くんだったね。+9が大きいなら、記号の開いた側が+9を向くように書く。『大きい数 > 小さい数』の順で読むと『+9は−5より大きい』となって、意味とぴったり合うよ。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ。①符号がちがう2つの数は、正の数の方がつねに大きい（数字の大きさは関係なし）。②不等号は開いている側が大きい数。判断と書き方、2つのチェックポイントを通れば完成だよ。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-011", "source_id": "1NEG-2-1-1", "grade": "中1", "unit": "正の数・負の数", "subunit": "加法", "appSkill": "S-NEG-011", "format": "計算", "cognitive": "知識・技能", "difficulty": "★1基礎", "level": 1, "stumble_tags": ["NN-add-02"], "problem_text": "(+4)+(+9)", "answer": "+13", "answer_expr": "(+4)+(+9)", "answer_value": 13, "solution_steps": ["同符号（正どうし）の加法なので、絶対値の和 4+9=13 を求める", "共通の符号 + をつけて +13"], "autoGradable": true, "points": 1, "timeSec": 20, "rewrite_note": "同符号(正)の加法の構造を保存し (+3)+(+7)→(+4)+(+9) に数値変更"}, "answers": {"problem_id": "P0-NEG-011", "answers": [{"student": "S1", "correct": true, "answer": "+13", "work": "同符号(正)どうしなので 4+9=13、符号はそのまま + → +13", "voice": "これは楽勝、プラスとプラスだから足すだけ", "error_type": null, "work_quality": "full"}, {"student": "S2", "correct": true, "answer": "+13", "work": "符号が同じだから絶対値をそのまま足して +13", "voice": れどうやって決めたか説明しなさい。", "rubric": ["同符号の加法では絶対値の和 4+9 をとることを述べている（1点）", "答えに共通の符号+をつける手順を説明している（1点）", "計算 4+9=13 と答え +13 が正しい（1点）"]}, "explanation": "(+4)+(+9) は同符号（正どうし）の加法です。同符号の加法は「絶対値の和」を求めて「共通の符号」をつけます。絶対値の和は 4+9=13、共通の符号は + なので、答えは +13 です。よくある間違いとして、簡単に見える問題を急いで暗算し +12 と書いてしまうミスがあります。やさしい問題ほど、答えを書く前に一度見直す習慣をつけましょう。", "hints": ["プラスとプラス、同じ符号どうしの足し算だね。同じ符号のとき、2つの数の大きさ（絶対値）は足すんだったかな？差をとるんだったかな？思い出してみよう。", "同符号の加法は、まず絶対値どうしを足すよ。4+9 を落ち着いて計算してみよう。", "4+9 の答えに、共通の符号の + をつければ完成だよ。暗算を焦らず、書く前にもう一度たしかめよう。"], "teacher_mode": {"start": "n1", "nodes": [{"id": "n1", "type": "explain", "text": "(+4)+(+9) を見てみよう。どちらもプラス、つまり同じ符号どうしの足し算だね。お金でいうと「4円持っていて、さらに9円もらった」場面。持っているお金はどんどん増えていくよね。", "next": "n2"}, {"id": "n2", "type": "check", "question": "符号が同じ2つの数を足すとき、絶対値（数の大きさ）はまずどうする？", "choices": ["絶対値どうしを足す", "絶対値どうしの差をとる", "大きい方の数だけ残す"], "correct": 0, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "「差をとる」のは符号がちがうときのやり方なんだ。今回は4円と9円、どちらも「もらう」方向だから、合わせればお金は増える一方だね。同じ向きのものは、そのまま合体＝足し算でいいんだよ。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "そのとおり。絶対値の和は 4+9=13。次は符号だよ。同符号の加法では、2つの数に共通している符号をそのままつける。今回はどちらも + だから、答えの符号も + だ。", "next": "n4"}, {"id": "n4", "type": "check", "question": "では 4+9=13 のあと、答えはどう書けばいい？", "choices": ["共通の符号+をつけて +13", "符号を−にして -13", "急いでいるので +12 と書く"], "correct": 0, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "もらってばかりなのに答えがマイナスになったり、暗算を急いで13が12になったりするのは、実はよくあるうっかりなんだ。「符号は共通のもの」「計算は書く前に見直す」の2つを意識しよう。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめよう。同符号の加法は「絶対値の和」＋「共通の符号」。(+4)+(+9) なら 4+9=13 に + をつけて +13。簡単な問題ほど見直しを忘れずにね。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-012", "source_id": "1NEG-2-1-5", "grade": "中1", "unit": "正の数・負の数", "subunit": "加法", "appSkill": "S-NEG-011", "format": "計算", "cognitive": "知識・技能", "difficulty": "★1基礎", "level": 1, "stumble_tags": ["NN-add-02"], "problem_text": "(-8)+(-5)", "answer": "-13", "answer_expr": "(-8)+(-5)", "answer_value": -13, "solution_steps": ["同符号（負どうし）の加法なので、絶対値の和 8+5=13 を求める", "共通の符号 − をつけて −13"], "autoGradable": true, "points": 1, "timeSec": 20, "rewrite_note": "同符号(負)の加法の構造を保存し (-10)+(-6)→(-8)+(-5) に数値変更"}, "answers": {"problem_id": "P0-NEG-012", "answers": [{"student": "S1", "correct": false, "answer": "+13", "work": "マイナスとマイナスが出会ったから+になると思って 8+5=13 に+をつけた", "voice": "マイナス同士だからプラスになるはず！", "error_type": "NN-add-02", "work_quality": "full"}, {"student": "S2", "correct": true, "answer": "-13", "work": "同符号どうしだから、そのまま8+5=13に-をつけて-13", "voice": "符号が同じ時は間違えにくいな", "error_type": null, "work_quality": "full"}, {"student": "S3", "correct": true, "answer": "-13", "work": "引き算の変換は関係ない。8+5=13、符号は-のまま", "voice": "これはひき算に直さなくていいやつ", "error_type": null, "work_quality": "full"}, {"student": "S4", "correct": true, "answer": "-13", "work": "8+5=13、共通の符号-をつけて-13", "voice": "落ち着いて計算すれば普通にできる", "error_type": null, "work_quality": "full"}, {"student": "S5", "correct": true, "answer": "-13", "work": "マイナス同士の足し算。8+5=13で答えは-13", "voice": "マイナス同士でも普通に計算できた", "error_type": null, "work_quality": "full"}, {"student": "S6", "correct": true, "answer": "-13", "work": "累乗はないので普通に8+5=13、符号は-", "voice": "累乗が出てこないから安心", "error_type": null, "work_quality": "full"}, {"student": "S7", "correct": true, "answer": "-13", "work": "特に条件文もないのでそのまま8+5=13、-13", "voice": "そのまま計算するだけの問題だ", "error_type": null, "work_quality": "full"}, {"student": "S8", "correct": true, "answer": "-13", "work": "-13", "voice": "-13でしょ", "error_type": null, "work_quality": "thin"}, {"student": "S9", "correct": true, "answer": "-13", "work": "項が2つで乗除もない。8+5=13、-13", "voice": "シンプルな式だから迷わない", "error_type": null, "work_quality": "full"}, {"student": "S10", "correct": true, "answer": "-13", "work": "同符号(負)どうしの加法なので絶対値の和8+5=13に共通の符号-をつけて-13", "voice": "負どうしは絶対値を足して負の符号をつける", "error_type": null, "work_quality": "full"}]}, "content": {"problem_id": "P0-NEG-012", "mcq": {"choices": ["+13", "-3", "+3", "-13"], "correct": 3, "distractors": [{"value": "+13", "origin": " 値をぜんぶ足して 5+8+2 を計算し、その合計にマイナスをつければ答えだよ。"], "teacher_mode": {"start": "n1", "nodes": [{"id": "n1", "type": "explain", "text": "かっこが3つもあってごちゃごちゃして見えるね。こういう式は、まず「かっこを外して項を並べる」のが定石。かっこの前の符号と中の符号の組み合わせで、外した後の符号が決まるよ。", "next": "n2"}, {"id": "n2", "type": "check", "question": "-(+8) の部分、かっこを外すとどうなるかな？", "choices": ["+8 のまま", "-8 になる", "8（符号なし）になる"], "correct": 1, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "かっこの前の＋や−、どう扱うか迷うよね。-(+8) は「+8 をひく」ということ。8をひくのだから、外すと -8 になるんだ。「−と＋の組み合わせは−」と覚えてもいいよ。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "その調子！ 同じように +(-2) は -2。だから式は -5-8-2 になるね。ここでもうひとつ、多くの人が迷う分かれ道があるよ。", "next": "n4"}, {"id": "n4", "type": "check", "question": "-5-8-2 はどう計算するのがいいかな？", "choices": ["マイナスが3つで＋になるから +15", "全部負の項だから絶対値を足してマイナスをつけて -15"], "correct": 1, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "「−と−で＋」を思い出したんだね。でもそれはかけ算のルール。数直線で考えてみよう。-5から左に8歩、さらに左に2歩。どんどん左（マイナス側）に進むだけで、プラスには戻らないよね。たし算・ひき算では、負の項はそのまま積み重なるんだ。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ！ ①かっこを外す：-(+8)→-8、+(-2)→-2 で式は -5-8-2。②全部負の項なら絶対値の和にマイナス：-(5+8+2)=-15。「−−で＋」はかけ算だけ、が今日の合言葉だよ。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-024", "source_id": "1NEG-3-1-5", "grade": "中1", "unit": "正の数・負の数", "subunit": "加減の混合", "appSkill": "S-NEG-032", "format": "計算", "cognitive": "知識・技能", "difficulty": "★2標準", "level": 2, "stumble_tags": ["NN-sub-03", "NN-add-01"], "problem_text": "-2-16+9-4", "answer": "-13", "answer_expr": "-2-16+9-4", "answer_value": -13, "solution_steps": ["正の項と負の項に分ける: 正は+9、負は-2-16-4=-22", "9-22=-13"], "autoGradable": true, "points": 2, "timeSec": 30, "rewrite_note": "かっこなし4項（負3・正1）の項整理という構造を保ち、-1,-14,+7,-3を-2,-16,+9,-4に変更"}, "answers": {"problem_id": "P0-NEG-024", "answers": [{"student": "S1", "correct": false, "answer": "+23", "work": "-2と-16がとなり合ってる→マイナスとマイナスでプラス、2+16=18を+18にする。+18+9-4=23", "voice": "最初の2つマイナス同士だ、プラスになおせる！", "error_type": "NN-sub-03", "work_quality": "full"}, {"student" ale": "つまずきDB「NN-add-01 異符号の加法で符号決定と絶対値処理がごちゃ混ぜ」を適用: 9-22 で絶対値の差13は出せたが、絶対値の大きい-22でなく+9の符号をつけて+13とする誤り"}]}, "written": {"prompt": "-2-16+9-4 を計算しなさい。正の項と負の項に分けて計算する方法で、どのようにまとめたかを途中の式を書いて説明しよう。", "rubric": ["正の項(+9)と負の項(-2, -16, -4)を正しく分けられている（2点）", "負の項の合計 -22 を正しく求めている（1点）", "9-22 の異符号の計算で符号と絶対値を正しく処理し -13 としている（1点）"]}, "explanation": "かっこのない式は、正の項と負の項に分けてまとめるのが確実。正の項は +9、負の項は -2-16-4=-22。よって 9-22=-13。異符号の計算では絶対値の差 22-9=13 をとり、絶対値の大きい -22 の符号をつける。よくある間違いは、(1) 先頭の -2-16 を「マイナス同士でプラス」と +18 にしてしまうこと（かけ算のルールの誤用）、(2) 符号を無視して数字を全部足し 31 としてしまうこと。まず「どれが正の項でどれが負の項か」の仕分けから始めよう。", "hints": ["-2と-16がとなりだから＋…としたくなるけど、それはかけ算のルールだよ。この式にかけ算はあるかな？ まずは式の中の数を、正の項と負の項に仕分けしてみよう。", "正の項は +9 だけ。負の項は -2、-16、-4 の3つだね。負の項だけ先に合計してみよう。", "負の項の合計は -22。あとは 9-22 の異符号の計算だよ。絶対値の差をとって、絶対値の大きいほうの符号をつければ答えだね。"], "teacher_mode": {"start": "n1", "nodes": [{"id": "n1", "type": "explain", "text": "項が4つもある式は、左から順に計算してもいいけど、「正の項チーム」と「負の項チーム」に分けてまとめるとミスがぐっと減るよ。まずはこの式の中の分かれ道をひとつ確認しよう。", "next": "n2"}, {"id": "n2", "type": "check", "question": "先頭の -2-16 の部分、どう扱うのがいいかな？", "choices": ["−と−だから＋18に直す", "-2 と -16 という負の項が2つ並んでいるだけ。合わせて -18"], "correct": 1, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "「−と−で＋」が頭に浮かんだんだね。それはかけ算のルールなんだ。数直線で考えると、-2からさらに左へ16歩進むイメージ。マイナスがマイナスを打ち消すのは、かけ算のときだけだよ。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "そう！ 負の項はそのまま積み重なる。仕分けすると、正の項は +9、負の項は -2-16-4=-22 になるね。最後は 9-22 という異符号の計算だ。", "next": "n4"}, {"id": "n4", "type": "check", "question": "9-22 の答えの符号はどうなるかな？", "choices": ["＋（9が式の中で正の項だから）", "−（絶対値が大きいのは22だから）", "符号はつけない"], "correct": 1, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "こう考えてみよう。22円の借金があって、9円しか持っていない。全部返しても返しきれない分が残るよね。残るのは借金＝マイナス。符号は「絶対値の大きいほう」で決まるんだ。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ！ かっこのない式は ①正の項と負の項に仕分け（正は+9、負は-22）、②異符号の計算は絶対値の差に大きいほうの符号（9-22=-13）。「−−で＋」はかけ算専用、たし算・ひき算には持ち込まない。これで4項でもこわくないね。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-025", "source_id": "1NE ll, "work_quality": "thin"}, {"student": "S9", "correct": true, "answer": "-11", "work": "乗除はないので正と負にわけて31-42=-11", "voice": "掛け算割り算がないから慎重にやれば平気", "error_type": null, "work_quality": "full"}, {"student": "S10", "correct": true, "answer": "-11", "work": "かっこを外す:23-17+8-25。正の項23+8=31、負の項-17-25=-42。31-42=-11", "voice": "かっこを外してから正と負に分ければ確実", "error_type": null, "work_quality": "full"}]}, "content": {"problem_id": "P0-NEG-025", "mcq": {"choices": ["-11", "+11", "+14", "+73"], "correct": 0, "distractors": [{"value": "+11", "origin": "student", "students": ["S2", "S5"], "error_type": "NN-add-01", "rationale": "S2は正の和31と負の和42の差11まで出したが符号決定で迷い＋を選択。S5は途中の 14-25 を「引けない」と感じて 25-14 に逆転させ符号なしの11とした（NN-intro-01）。どちらも値11に到達した実誤答"}, {"value": "+14", "origin": "student", "students": ["S4"], "error_type": "slip", "rationale": "23-(+17) を 23+17 と読み違えて 31+8-25=14 とした実誤答（符号の見落とし）"}, {"value": "+73", "origin": "db", "students": [], "error_type": "NN-sub-03", "rationale": "つまずきDB「NN-sub-03 加減への乗除ルール誤適用」を適用: 「−が2つあるから＋」と -17 と -25 を正に変えて全部足し 23+17+8+25=73 とする誤り"}]}, "written": {"prompt": "23-(+17)+8-25 を計算しなさい。かっこの外し方と、最後に答えの符号をどう決めたかが分かるように、途中の式を書いて説明しよう。", "rubric": ["-(+17) を -17 として正しくかっこを外せている（2点）", "正の項の和 31 と負の項の和 -42 を正しく求めている（1点）", "31-42 の符号を絶対値の大きいほうで決めて -11 としている（1点）"]}, "explanation": "かっこを外すと 23-17+8-25。正の項 23+8=31、負の項 -17-25=-42 にまとめて、31-42=-11。異符号の計算なので絶対値の差 42-31=11 に、絶対値の大きい -42 の符号をつける。よくある間違いは、(1) 差の11まで出せたのに「31が先に出てきたから」と＋の符号にしてしまうこと、(2) 途中で「14から25は引けない」と感じて 25-14 に逆転させてしまうこと。負の数を習った今は「小さい数−大きい数」も計算できて、答えが負になるだけだよ。", "hints": ["途中で「引けない」と困ったら、それは答えが負の数になる合図だよ。小学校では 3-5 はできなかったけど、今はできるね。まず -(+17) のかっこを外すと、符号はどうなるかな？", "かっこを外すと 23-17+8-25。正の項（23と8）と負の項（-17と-25）に分けて、それぞれ合計してみよう。", "正の項の合計は 31、負の項の合計は -42。31-42 は、絶対値の差をとって、絶対値の大きいほうの符号をつければ答えだよ。31のほうが先に書いてあっても、符号は大きさで決めるんだったね。"], "teacher_mode": {"start": "n1", "nodes": [{"id": "n1", "type": "explain", "text": "正の数から始まる式だけど、油断は禁物。この式には「かっこの外し方」と「最後の符号の決め方」という2つの分かれ道があるよ。順番に確かめよう。", "next": "n2"}, {"id": "n2", "type": "check", "question": "-(+17) のかっこを外すとどうなるかな？", "choices": ["+17", "-17"], "correct": 1, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "急いでいると +17 に見えちゃうこと、あるよね。かっこの前の−は、中の符号を反対にするスイッチだと思おう。+17 の反対だから -17。「−と＋の組み合わせは−」だよ。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "いいね！ 式は 23-17+8-25 になった。正の項は 23+8=31、負の項は -17-25=-42。最後は 31-42 という計算になるよ。ここが2つめの分かれ道。", "next": "n4"}, {"id": "n4", "type": "check", "question": "31-42、どう考えるのがいいかな？", "choices": ["31から42は引けないので、42-31 にして答えは11", "絶対値の差11に、絶対値の大きい42の側の−をつけて -11", "先に出てきた31が正の数だから +11"], "correct": 1, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "「引けない」と感じたり、符号で迷ったりするのは自然なことだよ。31円持っていて42円払うと、11円の借金になるよね。負の数を習った今は「小さい数−大きい数」もちゃんと計算できて、答えがマイナスになるだけ。符号は絶対値の大きいほうに合わせるんだ。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ！ ①-(+17) は -17（かっこ前の−は符号反転スイッチ）、②正の項31と負の項-42に仕分け、③異符号の計算は絶対値の差に大きいほうの符号で 31-42=-11。「引けない」はもう卒業、負の数が答えてくれるよ。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-026", "source_id": "1NEG-3-2-4", "grade": "中1", "unit": "正の数・負の数", "subunit": "加減の混合", "appSkill": "S-NEG-032", "format": "計算", "cognitive": "知識・技能", "difficulty": "★2標準", "level": 2, "stumble_tags": ["NN-sub-02", "NN-sub-01"], "problem_text": "(-16)+11-(-23)-14", "answer": "4", "answer_expr": "(-16)+11-(-23)-14", "answer_value": 4, "solution_steps": ["かっこをはずす: -16+11+23-14（-(-23)は+23になる）", "正の項 11+23=34、負の項 -16-14=-30", "34-30=4"], "autoGradable": true, "points": 2, "timeSec": 30, "rewrite_note": "-(-○)の二重符号を含む4項で答えが小さい正になる構造を保ち、-19,12,25,17を-16,11,23,14に変更"}, "answers": {"problem_id": "P0-NEG-026", "answers": [{"student": "S1", "correct": false, "answer": "+64", "work": "-(-23)は+23に直せる。正の項11+23=34。負の項をまとめるとき-16と-14はマイナス同士だからプラスになおして+30。34+30=64", "voice": "最後にマイナス同士をまとめたらプラスになるはず", "error_type": "NN-add-02", "work_quality": "full"}, {"student": "S2", "correct": false, "answer": "-4", "work": "-(-23)を+23に直して-16+11+23-14。正の項11+23=34、負の項16+14=30。差は4だけど符号を逆にして-4", "voice": pe": "check", "question": "最初に計算するのはどこかな？", "choices": ["-5+4", "4×(-3)"], "correct": 1, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "左から-5+4を先にやると、答えが変わってしまうんだ。計算の順番は「かけ算・わり算が先、たし算・ひき算は後」。マイナスが混ざっても、この順番のルールは変わらないよ。もう一度選んでみよう。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "そのとおり。4×(-3)はプラス×マイナスの異符号だからマイナスの12、つまり-12。式は-5+(-12)になったね。", "next": "n4"}, {"id": "n4", "type": "check", "question": "-5+(-12)はいくつかな？", "choices": ["+17", "-17", "+7"], "correct": 1, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "「マイナスとマイナスでプラス」はかけ算・わり算のルールで、たし算には使えないんだ。ここで混ざりやすいんだよね。5の借金にさらに12の借金が増えたら、借金は減る？増える？合わせていくらになるかな。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ。かけ算が先で4×(-3)=-12、次に-5+(-12)は同符号のたし算だから、絶対値をたして符号はマイナスのまま-17。「順番のルール」と「符号ルールの使い分け」がポイントだったね。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-049", "source_id": "1NEG-6-1-1", "grade": "中1", "unit": "正の数・負の数", "subunit": "正負の数の利用", "appSkill": "S-NEG-072", "format": "文章題", "cognitive": "思考・判断・表現", "difficulty": "★3応用", "level": 3, "stumble_tags": ["NN-app-01", "NN-abs-02"], "problem_text": "AさんとBさんが、数の書かれたカードを1枚ずつ引くゲームを5回行った。星のマークのカードは正の数、月のマークのカードは負の数を表す。引いたカードの数は次の通りであった。\n1回目 A:+6 B:-2 ／ 2回目 A:-4 B:+5 ／ 3回目 A:+2 B:-1 ／ 4回目 A:-5 B:+4 ／ 5回目 A:+3 B:-3\n1回ごとに数の大きい方をその回の勝ちとし、勝った回数が多い方を優勝とするとき、優勝はどちらか。", "answer": "Aさん", "answer_expr": null, "answer_value": null, "solution_steps": ["各回の数の大小を比べる: 1回目A(+6>-2)、2回目B(+5>-4)、3回目A(+2>-1)、4回目B(+4>-5)、5回目A(+3>-3)", "勝った回数はAが3回、Bが2回", "合計はA:+2、B:+3でBの方が大きいが、問われているのは勝った回数なので優勝はAさん"], "autoGradable": false, "points": 3, "timeSec": 120, "rewrite_note": "トランプの黒/赤を星/月マークのカードゲームに変更し数値も一新（合計ではBが上回るが回数勝ちはAという「合計と回数の混同」の罠を保存）"}, "answers": {"problem_id": "P0-NEG-049", "answers": [{"student": "S1", "correct": true, "answer": "Aさん", "work": "各回の勝敗:1回目A、2回目B、3回目A、4回目B、5回目A→A3勝B2勝、優勝はAさん", "voice": "各回の大小を丁寧に比べればいい", "error_type": null, "work_quality": "full"}, {"student": "S2", "correct": true, "answer": "Aさん", : "わからない", "origin": "student", "students": ["S5"], "error_type": "NN-abs-02", "rationale": "5回目の+3と-3で「絶対値が同じだから大小が決められない」と止まった実誤答"}, {"value": "引き分け", "origin": "db", "students": [], "error_type": "NN-abs-02", "rationale": "NN-abs-02由来。+3と-3を「同じ大きさ＝その回は引き分け」とみなすと2勝2敗1分となり、優勝を引き分けと判断する誤り"}]}, "written": {"prompt": "AさんとBさんのカードゲームについて、優勝はどちらかを答えなさい。各回の勝敗をどう判定したか、優勝を何で決めたかが分かるように説明しなさい。", "rubric": ["各回ごとに正負の数の大小を正しく比較している（+3と-3の回を含む）（2点）", "AとBの勝った回数をそれぞれ正しく数えている（2点）", "「合計」ではなく「勝った回数」で優勝を判断し、結論を述べている（2点）"]}, "explanation": "優勝のルールは「勝った回数が多い方」。各回の大小を比べると、1回目A(+6>-2)、2回目B(+5>-4)、3回目A(+2>-1)、4回目B(+4>-5)、5回目A(+3>-3)。正の数は負の数より必ず大きいので、+3と-3も引き分けではなくAの勝ち。よってAが3勝、Bが2勝で優勝はAさん。よくある間違いは、(1)5回分の合計（A:+2、B:+3）で比べてBさんと答えてしまう（ルールは回数）、(2)+3と-3を「同じ数だから決められない」と迷ってしまう（絶対値が同じでも符号が違えば正の方が大きい）で、どちらも実際にあった誤答。", "hints": ["優勝の決め方をもう一度読んでみよう。「数の合計が大きい方」かな？それとも「勝った回数が多い方」かな？", "1回ごとに大小を比べよう。正の数と負の数では、必ず正の数の方が大きいよ。+3と-3も、絶対値は同じでも引き分けではないんだ。", "5回分の勝ちをAさん・Bさんそれぞれ数えてみよう。3勝と2勝に分かれるはず。勝った回数が多い方が優勝だね。"], "teacher_mode": {"start": "n1", "nodes": [{"id": "n1", "type": "explain", "text": "このゲームの優勝の決め方は、問題文にはっきり書いてあるよ。「勝った回数が多い方」なんだ。カードの数の合計ではないよ。ここを読み飛ばすと、答えが変わってしまうんだ。", "next": "n2"}, {"id": "n2", "type": "check", "question": "この問題で、優勝はどうやって決まるのかな？", "choices": ["5回の数の合計が大きい方", "勝った回数が多い方"], "correct": 1, "onCorrect": "n3", "onWrong": "n2r"}, {"id": "n2r", "type": "explain", "text": "「結局どっちが大きい数を集めたか＝合計」と考えたくなるよね。実はこの問題、合計で比べると回数の勝敗と結果が逆になるように作られているんだ。この問題で「0」になる基準は何か、何を比べるのか、ルールの文をもう一度読んでみよう。", "next": "n2"}, {"id": "n3", "type": "explain", "text": "そのとおり。では1回ずつ大小を比べよう。正の数と負の数なら、必ず正の数の方が大きいよ。迷いやすいのは5回目の+3と-3。数字は同じ3でも、数直線で+3は0より右、-3は0より左。同じ大きさの引き分けではないんだ。", "next": "n4"}, {"id": "n4", "type": "check", "question": "+3と-3では、どちらが大きいかな？", "choices": ["同じ大きさだから引き分け", "+3の方が大きい"], "correct": 1, "onCorrect": "n5", "onWrong": "n4r"}, {"id": "n4r", "type": "explain", "text": "絶対値（0からの距離）は同じ3だから、迷うのはとても自然だよ。でも大小は数直線の位置で決まるんだ。+3と-3、数直線でどっちが右にある？右にある方が大きい数だったね。", "next": "n4"}, {"id": "n5", "type": "explain", "text": "まとめ。各回の勝ちはA・B・A・B・AでAが3勝、Bが2勝。合計だとBの方が大きいけれど、ルールは「勝った回数」だから優勝はAさん。問題文の「決め方」を最初に確認するクセをつけると強いよ。", "next": "end"}]}}}, {"problem": {"id": "P0-NEG-050", "source_id": "1NEG-6-6", "grade": "中1", "unit": "正の数・負の数", "subunit": "正負の数の利用", "appSkill": "S-NEG-062", "format": "文章題", "cognitive": "思考・判断・表現", "difficulty": "★3応用", "level": 3, "stumble_tags": ["NN-app-01"], "problem_text": "あるタワーには、地上からの高さが第1展望台150m、第2展望台250m、第3展望台340m、最上階452mの4つのフロアがある。第3展望台の高さを基準（0m）とするとき、最上階・第2展望台・第1展望台の高さを、+、−の符号を使って表しなさい。", "answer": "最上階 +112m, 第2展望台 -90m, 第1展望台 -190m", "answer_expr": null, "answer_value": null, "solution_steps": ["基準（第3展望台340m）との差を求める。基準より高ければ+、低ければ−で表す", "最上階: 452-340=112なので+112m", "第2展望台: 250-340=-90なので-90m、第1展望台: 150-340=-190なので-190m"], "autoGradable": false, "points": 4, "timeSec": 180, "rewrite_note": "山の合目・標高をタワーの展望台の高さに変更し数値も一新（上から2番目を基準に他3か所を符号付きで表す構造を保存）"}, "answers": {"problem_id": "P0-NEG-050", "answers": [{"student": "S1", "correct": true, "answer": "最上階+112m, 第2展望台-90m, 第1展望台-190m", "work": "452-340=112→+112m、250-340=-90→-90m、150-340=-190→-190m", "voice": "基準より高いか低いかで符号を決める", "error_type": null, "work_quality": "full"}, {"student": "S2", "correct": true, "answer": "最上階+112m, 第2展望台-90m, 第1展望台-190m", "work": "452-340=112、250-340=-90、150-340=-190", "voice": "引き算の答えの符号をそのまま使えばいい", "error_type": null, "work_quality": "full"}, {"student": "S3", "correct": true, "answer": "最上階+112m, 第2展望台-90m, 第1展望台-190m", "work": "452-340=112、250-340=-90、150-340=-190", "voice": "基準より下は全部マイナスになる", "error_type": null, "work_quality": "full"}, {"student": "S4", "correct": true, "answer": "最上階+112m, 第2展望台-90m, 第1展望台-190m", "work": "452-340=112、340-250=90で-90、340-150=190で-190", "voice": "一個ずつ引き算、符号を付け忘れないように", "error_type": null, "work_quality": "full"}, {"student": "S5", "correct": false, "answer": "最上階112m, 第2展望台90m, 第1展望台190m", "work": "340との差の絶対値は正しく求められる:452-340=112、340-250=90、340-150=190。しかし基準より低い場合に負の符号をつける操作を忘れて、距離の数だけを書いてしまう", "voice": "低い方はマイナスってわかってるけど…数字だけ書いちゃった", "er N-add-01", "work_quality": "full"}, {"student": "S3", "correct": true, "answer": "開さん", "work": "開さん:4-2+6-3+5=10 鈴さん:3+7-4+8-9=5 開さんの勝ち", "voice": "引き算じゃなくて足し算の集まりだから普通にやる", "error_type": null, "work_quality": "full"}, {"student": "S4", "correct": true, "answer": "開さん", "work": "開さん:4-2+6-3+5=10 鈴さん:3+7-4+8-9=5 10>5なので開さん", "voice": "項が多いから慎重に足していく", "error_type": null, "work_quality": "full"}, {"student": "S5", "correct": false, "answer": "鈴さん", "work": "開さんの合計を計算する途中、マイナスが出るたびに『できない』感覚になり大小だけで判断。鈴さんの得点に+8,+7など大きい正の数が多いので鈴さんの方が大きいと思い込んだ", "voice": "鈴さんの方に大きい数字がいっぱいあるから鈴さんが勝ちだよね", "error_type": "NN-abs-02", "work_quality": "thin"}, {"student": "S6", "correct": true, "answer": "開さん", "work": "開さん:4-2+6-3+5=10 鈴さん:3+7-4+8-9=5 開さんの勝ち", "voice": "累乗はないから普通に計算する", "error_type": null, "work_quality": "full"}, {"student": "S7", "correct": false, "answer": "鈴さん", "work": "『得点の合計が多い方』を見て、マイナスの符号を気にせず数字の大きさだけを見比べ、鈴さんの列に8や9など大きい数字が多いことから鈴さんが勝ちと判断した", "voice": "数字が大きいのは鈴さんの方だな、これでいいでしょ", "error_type": "NN-app-01", "work_quality": "full"}, {"student": "S8", "correct": true, "answer": "開さん", "work": "開さん10、鈴さん5", "voice": "計算するだけ", "error_type": null, "work_quality": "thin"}, {"student": "S9", "correct": false, "answer": "鈴さん", "work": "項が5つあるので左から順に処理する中で、マイナスが2個ずつ(開さんは-2,-3、鈴さんは-4,-9)で偶数個だからと考え、両方とも全部プラスにして計算。開さん4+2+6+3+5=20、鈴さん3+7+4+8+9=31とし、鈴さんが勝ちとした", "voice": "マイナス2個は偶数だから、結局プラスってことだよね", "error_type": "NN-mul-02", "work_quality": "full"}, {"student": "S10", "correct": true, "answer": "開さん", "work": "開さんの合計:(+4)+(-2)+(+6)+(-3)+(+5)=4-2+6-3+5=10。鈴さんの合計:(+3)+(+7)+(-4)+(+8)+(-9)=3+7-4+8-9=5。10>5なので開さんの勝ち。念のため各項を再確認した", "voice": "1項ずつ符号を確認しながら合計を出す", "error_type": null, "work_quality": "full"}]}, "content": {"problem_id": "P0-NEG-140", "mcq": {"choices": ["鈴さん（符号の処理を誤り鈴さんの合計を大きく見積もった）", "引き分け（同点）", "得点表だけでは決められない", "開さん（開さん+10点、鈴さん+5点）"], "correct": 3, "distractors": [{"value": "鈴さん", "origin": "student", "students": ["S2", "S5", "S7", "S9"], "error_type": "NN-add-01", "rationa }]}}}, {"problem": {"id": "P0-NEG-141", "source_id": "1NEG-6-2", "grade": "中1", "unit": "正の数・負の数", "subunit": "正負の数の利用", "appSkill": "S-NEG-073", "format": "文章題", "cognitive": "思考・判断・表現", "difficulty": "★3応用", "level": 3, "stumble_tags": ["NN-mul-01", "NN-mul-02"], "problem_text": "積が-8となる2つの整数の組をすべて答えなさい（並び順は考えない）。", "answer": "1と-8, -1と8, 2と-4, -2と4", "answer_expr": null, "answer_value": null, "solution_steps": ["積が負になるのは異符号の2数の積のときだけである", "8の約数の組は1と8、2と4である", "それぞれに異符号を割り当てて4組を作る"], "autoGradable": false, "points": 3, "timeSec": 90, "rewrite_note": "元の積-6を-8に変更。約数の組が2組から2組（1,8と2,4）になり、負の組と順序の重複を見落とす構造は同一。"}, "answers": {"problem_id": "P0-NEG-141", "answers": [{"student": "S1", "correct": true, "answer": "1と-8, -1と8, 2と-4, -2と4", "work": "積が負になるのは異符号どうし。8の約数の組1,8と2,4それぞれに異符号を割り当てて4組", "voice": "乗法は得意だから符号もちゃんと考えられる", "error_type": null, "work_quality": "full"}, {"student": "S2", "correct": true, "answer": "1と-8, -1と8, 2と-4, -2と4", "work": "積が負→異符号。8=1×8=2×4の組にそれぞれ+-を割り振って4組書いた", "voice": "異符号ってことをちゃんと意識して書く", "error_type": null, "work_quality": "full"}, {"student": "S3", "correct": true, "answer": "1と-8, -1と8, 2と-4, -2と4", "work": "積が-8になるのは異符号どうし。約数の組1,8と2,4にそれぞれ正負を入れ替えて4組", "voice": "引き算の変換とは別の話だから落ち着いてできる", "error_type": null, "work_quality": "full"}, {"student": "S4", "correct": true, "answer": "1と-8, -1と8, 2と-4, -2と4", "work": "8の約数の組(1,8)(2,4)にそれぞれ異符号を割り当てて4組", "voice": "約数を書き出してから符号をつける", "error_type": null, "work_quality": "full"}, {"student": "S5", "correct": false, "answer": "2と-4", "work": "8の約数の組を思いつくのに時間がかかり、2と4の組だけ見つけて2と-4と書いて終わりにした", "voice": "組をぜんぶ見つけるのが難しい…とりあえず1個書いておこう", "error_type": "NN-abs-01", "work_quality": "thin"}, {"student": "S6", "correct": true, "answer": "1と-8, -1と8, 2と-4, -2と4", "work": "8の約数の組1,8と2,4にそれぞれ異符号を割り当てて4組。累乗ではないので普通に処理", "voice": "累乗じゃなければ乗法は平気", "error_type": null, "work_quality": "full"}, {"student": "S7", "correct": false, "answer": "1と-8, 2と-4", "work": "積が負になる組として1と-8、2と-4を見つけたが、『すべて』の指示を読み飛ばし、符号を入れ替えた-1と8、-2と4の組も同じ組 )×(-1) → +6（負が奇数個なのに正）", "belief": "マイナスが2個以上あればプラス", "question": "マイナスは全部で何個ある？ 偶数？奇数？"}, "NN-div-01": {"title": "除法を乗法に直すときの符号・逆数ミス", "wrong_example": "(-6)÷(-2) の処理で符号を落とす／逆数化で分子分母を取り違える", "belief": "割り算の符号は掛け算と別ルール（実は同じ）", "question": "割り算は、どんな掛け算に書き直せる？"}, "NN-pow-01": {"title": "(−2)² と −2² の混同", "wrong_example": "-2² → +4／(-2)² → -4", "belief": "2乗すれば必ずプラス／指数は前の符号も巻き込む", "question": "-2² の2乗されているのは何？ -2全体？それとも2だけ？"}, "NN-pow-02": {"title": "累乗を「底×指数」と計算", "wrong_example": "2³ → 6／(-3)² → -6", "belief": "累乗は底と指数の掛け算", "question": "2³ は2を何回かけてる？ 2×2×2 のどれ？"}, "NN-mix-01": {"title": "四則混合で負が絡むと演算順序が崩れる", "wrong_example": "3-2×4 → 4（前から計算）", "belief": "式は左から順に計算する（乗除優先を忘れる／負があると優先順位が飛ぶ）", "question": "この式で、先に計算するのはどこ？ かけ算・わり算が先だったね"}, "NN-mix-02": {"title": "−(a−b) 型の符号配り忘れ", "wrong_example": "-(5-2) → -5-2=-7", "belief": "前のマイナスは最初の項だけにかかる", "question": "カッコの前のマイナスは、中の全部にかかる？ それとも最初だけ？"}, "NN-app-01": {"title": "基準・正の向きの取り違え（利用）", "wrong_example": "「基準より低い」を正で表す／仮平均からのズレの符号を逆にする", "belief": "大きい量＝プラスと素朴に決める（基準と向きの定義を見ない）", "question": "この問題で「0」はどこ？ プラスはどっち向きと決めた？"}};</script>
<script>
let DATA = [];
let current = 0;
let tmState = null;
let selectedConfusion = null;

DATA = window.__PIPELINE_SAMPLE_DATA__;
renderNav();
renderProblem(0);

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '<h1>数学ラボ おためし</h1><div class="sub">正の数・負の数／50問</div>';
  DATA.forEach((d, i) => {
    const b = document.createElement('button');
    b.textContent = d.problem.id + ' ' + d.problem.subunit;
    b.className = i === current ? 'active' : '';
    b.onclick = () => { current = i; renderNav(); renderProblem(i); };
    nav.appendChild(b);
  });
}

function renderProblem(i){
  const { problem, answers, content } = DATA[i];
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card">
      <h2>問題 ${problem.id}　${problem.subunit}／${problem.difficulty}</h2>
      <div class="problem-text">${problem.problem_text}</div>
      <div class="meta"><span>appSkill: ${problem.appSkill}</span><span>stumble: ${problem.stumble_tags.join(', ')}</span></div>
      <button class="hint-toggle" id="hint-toggle">💡 ヒントを見る</button>
      <div class="hint-panel" id="hint-panel"></div>
    </div>

    <div class="card">
      <h2>4択で答える</h2>
      <div class="choices" id="choices"></div>
    </div>

    <div class="card">
      <h2>記述で答える</h2>
      <div class="written-prompt">${content.written.prompt}</div>
      <ul class="rubric">${content.written.rubric.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>

    <div class="card">
      <h2>解説</h2>
      <div class="explanation">${content.explanation}</div>
    </div>

    <div class="card">
      <h2>教師とのやりとり（教師モード）</h2>
      <div class="tm-box" id="tm-box"></div>
      <div style="margin-top:8px"><span class="reset-link" id="tm-reset">最初からやり直す</span></div>
    </div>
  `;

  document.getElementById('tm-reset').onclick = startTeacherMode;
  renderHintUI(DATA[i]);
  renderChoices(content.mcq);
  startTeacherMode();
}

// ---- ヒント: 困り感選択メニュー ----
// つまずきDB(NN)の「内心の誤ルール」「発問」を使い、答えを言わずに気づかせる問いを提示する。
function collectConfusionTags(entry){
  const { problem, content } = entry;
  const tags = new Set(problem.stumble_tags || []);
  (content.mcq.distractors || []).forEach(d => {
    if (d.error_type && d.error_type !== 'slip') tags.add(d.error_type);
  });
  return [...tags].filter(t => window.__NN_DB__[t]);
}

function renderHintUI(entry){
  const toggle = document.getElementById('hint-toggle');
  const panel = document.getElementById('hint-panel');
  const tags = collectConfusionTags(entry);
  selectedConfusion = null;

  const items = tags.map(t => {
    const nn = window.__NN_DB__[t];
    return `<button class="confusion-item" data-tag="${t}">${nn.wrong_example} って思っちゃう…</button>`;
  }).join('');

  panel.innerHTML = `
    <div class="hint-panel-title">どこで困ってる？ 近いものを選んでみよう。</div>
    ${items}
    <button class="confusion-item" data-tag="__generic__">そもそも何から考えればいいかわからない</button>
    <div id="confusion-response"></div>
  `;

  toggle.onclick = () => {
    toggle.classList.toggle('open');
    panel.classList.toggle('open');
  };

  panel.querySelectorAll('.confusion-item').forEach(btn => {
    btn.onclick = () => {
      panel.querySelectorAll('.confusion-item').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      showConfusionResponse(entry, btn.dataset.tag);
    };
  });
}

function showConfusionResponse(entry, tag){
  const box = document.getElementById('confusion-response');
  const hints = entry.content.hints;
  if (tag === '__generic__') {
    box.innerHTML = `
      <div class="confusion-response">
        <div class="q">${hints[0]}</div>
        <span class="more-link" id="more1">まだよくわからない、もう少し教えて</span>
        <div class="more-text" id="moretext1">${hints[1]}
          <div style="margin-top:8px"><span class="more-link" id="more2">それでもわからない、あと少しだけ</span></div>
          <div class="more-text" id="moretext2">${hints[2]}</div>
        </div>
      </div>`;
  } else {
    const nn = window.__NN_DB__[tag];
    box.innerHTML = `
      <div class="confusion-response">
        <div class="q">🧑‍🏫 ${nn.question}</div>
        <span class="more-link" id="more1">考えてみたけどまだわからない</span>
        <div class="more-text" id="moretext1">${hints[1]}
          <div style="margin-top:8px"><span class="more-link" id="more2">それでもわからない、あと少しだけ</span></div>
          <div class="more-text" id="moretext2">${hints[2]}</div>
        </div>
      </div>`;
  }
  document.getElementById('more1').onclick = () => document.getElementById('moretext1').classList.add('shown');
  const m2 = document.getElementById('more2');
  if (m2) m2.onclick = () => document.getElementById('moretext2').classList.add('shown');
}

function renderChoices(mcq){
  const box = document.getElementById('choices');
  box.innerHTML = '';
  mcq.choices.forEach((c, idx) => {
    const el = document.createElement('div');
    el.className = 'choice';
    el.innerHTML = `<div>${c}</div><div class="rationale"></div>`;
    el.onclick = () => {
      document.querySelectorAll('.choice').forEach(x => x.classList.remove('correct','wrong','revealed'));
      el.classList.add('revealed');
      if (idx === mcq.correct) {
        el.classList.add('correct');
        el.querySelector('.rationale').textContent = '正解！';
      } else {
        el.classList.add('wrong');
        const d = mcq.distractors.find(dd => dd.value === c);
        el.querySelector('.rationale').textContent = d ? `${d.rationale}（${d.origin === 'student' ? d.students.join(',') + 'の実誤答由来' : 'つまずきDB由来'}）` : '';
      }
    };
    box.appendChild(el);
  });
}

function startTeacherMode(){
  const { content } = DATA[current];
  tmState = content.teacher_mode.start;
  renderTeacherNode();
}

function renderTeacherNode(){
  const { content } = DATA[current];
  const nodes = content.teacher_mode.nodes;
  const box = document.getElementById('tm-box');
  if (tmState === 'end') {
    box.innerHTML = '<div class="tm-end">おしまい！よく頑張ったね。</div>';
    return;
  }
  const node = nodes.find(n => n.id === tmState);
  if (!node) { box.innerHTML = '<div class="tm-end">（ノードが見つかりません: ' + tmState + '）</div>'; return; }

  if (node.type === 'explain') {
    box.innerHTML = `<div class="tm-teacher">🧑‍🏫 ${node.text}</div>`;
    const btn = document.createElement('button');
    btn.className = 'tm-choice';
    btn.textContent = 'つぎへ →';
    btn.onclick = () => { tmState = node.next; renderTeacherNode(); };
    box.appendChild(btn);
  } else if (node.type === 'check') {
    box.innerHTML = `<div class="tm-teacher">🧑‍🏫 ${node.question}</div>`;
    node.choices.forEach((c, idx) => {
      const btn = document.createElement('button');
      btn.className = 'tm-choice';
      btn.textContent = c;
      btn.onclick = () => {
        tmState = idx === node.correct ? node.onCorrect : node.onWrong;
        renderTeacherNode();
      };
      box.appendChild(btn);
    });
  }
}
</script>
</body>
</html>
